<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Hero background placeholder">
  <!-- PLACEHOLDER: Replace with real brand photo/video freeze-frame once assets are available -->

  <!-- Base dark background -->
  <rect width="1600" height="900" fill="#050505"/>

  <!-- Subtle orange radial glow from center-left (where robot would be) -->
  <radialGradient id="hero-glow" cx="35%" cy="55%" r="55%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#ea580c" stop-opacity="0.18"/>
    <stop offset="55%" stop-color="#ea580c" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#hero-glow)"/>

  <!-- Secondary subtle warm glow upper-right -->
  <radialGradient id="hero-glow2" cx="80%" cy="20%" r="35%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#ea580c" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#hero-glow2)"/>

  <!-- Faint grid lines — vertical (every 80px) -->
  <g stroke="#27272a" stroke-width="0.5" opacity="0.4">
    <line x1="80"   y1="0" x2="80"   y2="900"/>
    <line x1="160"  y1="0" x2="160"  y2="900"/>
    <line x1="240"  y1="0" x2="240"  y2="900"/>
    <line x1="320"  y1="0" x2="320"  y2="900"/>
    <line x1="400"  y1="0" x2="400"  y2="900"/>
    <line x1="480"  y1="0" x2="480"  y2="900"/>
    <line x1="560"  y1="0" x2="560"  y2="900"/>
    <line x1="640"  y1="0" x2="640"  y2="900"/>
    <line x1="720"  y1="0" x2="720"  y2="900"/>
    <line x1="800"  y1="0" x2="800"  y2="900"/>
    <line x1="880"  y1="0" x2="880"  y2="900"/>
    <line x1="960"  y1="0" x2="960"  y2="900"/>
    <line x1="1040" y1="0" x2="1040" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
    <line x1="1360" y1="0" x2="1360" y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
    <line x1="1520" y1="0" x2="1520" y2="900"/>
    <!-- Horizontal (every 80px) -->
    <line x1="0" y1="80"  x2="1600" y2="80"/>
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="240" x2="1600" y2="240"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="480" x2="1600" y2="480"/>
    <line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="640" x2="1600" y2="640"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
  </g>

  <!-- Accent crosshair lines intersecting at the main glow origin -->
  <line x1="560" y1="0"    x2="560"  y2="900"  stroke="#ea580c" stroke-width="0.5" opacity="0.12"/>
  <line x1="0"   y1="495"  x2="1600" y2="495"  stroke="#ea580c" stroke-width="0.5" opacity="0.08"/>

  <!-- Vignette overlay — dark from edges inward -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#050505" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050505" stop-opacity="0.75"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
